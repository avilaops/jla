name: Deploy Preview (PRs)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview-build:
    name: Build Preview
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.jla.avilaops.com

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build realizado com sucesso!\n\n' +
                    '📦 Preview disponível após merge para `main`\n' +
                    '🌐 Deploy automático via Render'
            })
