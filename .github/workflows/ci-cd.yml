name: CI/CD Pipeline - JLA Importadora

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20.x'

jobs:
  # Job 1: Lint e validação de código
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Check TypeScript
        run: npx tsc --noEmit
        continue-on-error: true

  # Job 2: Build do Next.js
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.jla.avilaops.com

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # Job 3: Teste da API
  test-api:
    name: Test Backend API
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start API server
        run: |
          npm run api &
          sleep 5
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 2 http://localhost:3000/health || exit 1

      - name: Test produtos endpoint
        run: |
          curl --fail http://localhost:3000/api/produtos || exit 1

      - name: Test categorias endpoint
        run: |
          curl --fail http://localhost:3000/api/categorias || exit 1

  # Job 4: Validação de Schema SQL
  validate-sql:
    name: Validate SQL Schema
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test SQL Schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -f database-schema.sql
          echo "✅ Schema SQL válido"

      - name: Verify tables created
        run: |
          TABLES=$(PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';")
          echo "Tabelas criadas: $TABLES"
          if [ "$TABLES" -lt 5 ]; then
            echo "❌ Erro: Menos de 5 tabelas criadas"
            exit 1
          fi

  # Job 5: Notificação de Deploy
  deploy-notification:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build, test-api, validate-sql]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy (Backend)
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_API }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"
            echo "✅ Backend deploy triggered"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_API não configurado - Pule ou configure em Settings > Secrets"
          fi

      - name: Trigger Render Deploy (Frontend)
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"
            echo "✅ Frontend deploy triggered"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_WEB não configurado - Pule ou configure em Settings > Secrets"
          fi

      - name: Deployment Summary
        run: |
          echo "🚀 Deploy iniciado automaticamente!"
          echo "📦 Backend: https://api.jla.avilaops.com"
          echo "🌐 Frontend: https://jla.avilaops.com"
          echo "⏱️  Tempo estimado: 3-5 minutos"

  # Job 6: Verificação pós-deploy
  post-deploy-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy-notification
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Wait for deployment
        run: sleep 180

      - name: Check Backend Health
        run: |
          curl --fail --retry 10 --retry-delay 30 https://api.jla.avilaops.com/health || exit 1
          echo "✅ Backend is healthy"

      - name: Check Frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jla.avilaops.com)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Frontend is accessible (HTTP $STATUS)"
          else
            echo "⚠️  Frontend returned HTTP $STATUS"
            exit 1
          fi

      - name: Test API Endpoints
        run: |
          curl --fail https://api.jla.avilaops.com/api/produtos
          curl --fail https://api.jla.avilaops.com/api/categorias
          echo "✅ All API endpoints working"
